openapi: 3.0.3
info:
  version: '2.0'
  title: Individuals Savings Income (MTD)
  description: |
    # Send fraud prevention data
    HMRC monitors transactions to help protect your customers' confidential data from criminals and fraudsters. 

    <div class="govuk-warning-text warning-icon-fix">
      <span class="govuk-warning-text__icon warning-icon-ui-fix" aria-hidden="true">!</span>
      <strong class="govuk-warning-text__text">
        <span class="govuk-warning-text__assistive">Warning</span>
        You are required by law to submit header data for this API. This includes all associated APIs and endpoints.
      </strong>
    </div>

    [Check the data you need to send](/guides/fraud-prevention/). You can also use the [Test API](/api-documentation/docs/api/service/txm-fph-validator-api/1.0) during initial development and as part of your quality assurance checks.

    # Mapping APIs to Self Assessment tax return forms
    Some parameters in this API map to box numbers in one or more Self Assessment tax return forms. To learn more and to download this mapping information as a CSV file, go to [income-tax-mtd-changelog/mapping](https://github.com/hmrc/income-tax-mtd-changelog?tab=readme-ov-file#mapping-apis-to-self-assessment-tax-return-forms) on GitHub.

    # Changelog
    You can find the changelog in the [income-tax-mtd-changelog](https://github.com/hmrc/income-tax-mtd-changelog/#readme) on GitHub.

    # Support

    * Direct reports of bugs or errors in Production or Sandbox code, 
    or queries about HMRC business functionality (such as how a specific field is used by HMRC or why it is needed) to the [Software Development Support Team (SDST)](https://developer.service.hmrc.gov.uk/developer/support).
    * Send queries or feedback related to the design of the APIs (including recommended changes) using
    the [income-tax-mtd-changelog](https://github.com/hmrc/income-tax-mtd-changelog/issues) GitHub page.
    * <a href="/contact/report-technical-problem?newTab=true&service=api-documentation-frontend" target="_blank">Is this page not working properly? (opens in new tab)</a>
servers:
  - url: https://test-api.service.hmrc.gov.uk
    description: Sandbox
  - url: https://api.service.hmrc.gov.uk
    description: Production
tags:
  - name: UK Savings Account
    description: Resources relating to an individual’s UK savings account
  - name: Savings Income
    description: Resources relating to an individual's savings income
paths:
  /individuals/savings-income/uk-accounts/{nino}:
    get:
      security:
        - User-Restricted:
            - read:self-assessment
      summary: List All UK Savings Accounts
      description: |
        This endpoint allows a developer to retrieve a list of all UK savings accounts that were previously added for an individual.
        A National Insurance number must be provided.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                       |
        |----------------------------------|------------------------------------------------|
        | N/A - DEFAULT                    | Simulates success response.                    |
        | NOT_FOUND                        | Simulates the scenario where no data is found. |   
        | STATEFUL                         | Performs a stateful list.                      |
        | REQUEST_CANNOT_BE_FULFILLED      | Simulates the scenario where the request cannot be fulfilled for various reasons other than the ones triggering other errors.|
      tags:
        - UK Savings Account
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: &ref_3
            type: string
            example: TC663795B
          required: true
        - in: query
          name: savingsAccountId
          description: The unique identifier of a savings account.
          schema:
            type: string
            pattern: ^[A-Za-z0-9]{15}$
            example: SAVKB2UVwUTBQGJ
          required: false
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: &ref_4
            type: string
            enum:
              - application/vnd.hmrc.2.0+json
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *read:self-assessment* scope.
          schema: &ref_20
            type: string
            example: Bearer bb7fed3fe10dd235a2ccda3d50fb
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: &ref_5
            type: string
          required: false
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: &ref_0
                type: string
                example: c75f40a6-a3df-4429-a697-471eeec46435
              required: true
            Deprecation:
              name: Deprecation
              in: header
              description: |
                The deprecation date/time for this endpoint.
              schema: &ref_6
                type: string
                example: Sun, 01 Jan 2023 23:59:59 GMT
              required: false
            Sunset:
              name: Sunset
              in: header
              description: |
                The earliest date/time this endpoint will become unavailable after deprecation.
              schema: &ref_7
                type: string
                example: Sun, 02 Jul 2023 23:59:59 GMT
              required: false
            Link:
              name: Link
              in: header
              description: |
                URL of the documentation for the API.
              schema: &ref_8
                type: string
                example: https://developer.service.hmrc.gov.uk/api-documentation/docs/api/service/individuals-savings-income-api
              required: false
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema#
                description: List All UK Savings Accounts Response
                type: object
                properties:
                  savingsAccounts:
                    type: array
                    description: An array containing details of savings accounts for the provided National Insurance number.
                    items:
                      type: object
                      properties:
                        savingsAccountId:
                          type: string
                          description: The unique identifier of the savings account.
                          pattern: ^[A-Za-z0-9]{15}$
                          example: SAVKB2UVwUTBQGJ
                        accountName:
                          type: string
                          description: Friendly account name.
                          pattern: ^[A-Za-z0-9 &'\(\)\*,\-\./@£]{1,32}$
                          example: Shares savings account
                      required:
                        - savingsAccountId
                required:
                  - savingsAccounts
              examples:
                example-response:
                  description: Example Response
                  value:
                    $ref: ./examples/ukSavingsAccount/list_response.json
        '400':
          description: Bad request
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: &ref_1
                  code:
                    description: The error code
                    type: string
                  message:
                    description: The error message
                    type: string
                required: &ref_2
                  - code
              examples:
                FORMAT_NINO:
                  description: The format of the supplied NINO field is not valid.
                  value: &ref_9
                    code: FORMAT_NINO
                    message: The provided NINO is invalid
                FORMAT_SAVINGS_ACCOUNT_ID:
                  description: The format of the supplied savings account ID is not valid
                  value: &ref_16
                    code: FORMAT_SAVINGS_ACCOUNT_ID
                    message: The format of the supplied savings account ID is not valid
                RULE_INCORRECT_GOV_TEST_SCENARIO:
                  description: The request did not match any available Sandbox data. Check that the supplied Gov-Test-Scenario is correct for this endpoint version. This error will only be returned in the Sandbox environment.
                  value: &ref_10
                    code: RULE_INCORRECT_GOV_TEST_SCENARIO
                    message: The supplied Gov-Test-Scenario is not valid
        '403':
          description: Forbidden
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                CLIENT_OR_AGENT_NOT_AUTHORISED:
                  description: |
                    The client or agent is not authorised. This is because: the client is not subscribed to MTD, 
                    the agent is not subscribed to Agent Services, or the client has not authorised the agent to act on their behalf.
                  value: &ref_11
                    code: CLIENT_OR_AGENT_NOT_AUTHORISED
                    message: The client and/or agent is not authorised
        '404':
          description: Not Found
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                MATCHING_RESOURCE_NOT_FOUND:
                  description: The supplied income source could not be found.
                  value: &ref_12
                    code: MATCHING_RESOURCE_NOT_FOUND
                    message: Matching resource not found
        '422':
          description: Unprocessable Entity
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                RULE_REQUEST_CANNOT_BE_FULFILLED:
                  description: The request cannot be fulfilled. More specific information is provided in the error message.
                  value: &ref_13
                    code: RULE_REQUEST_CANNOT_BE_FULFILLED
                    message: Custom (will vary in production depending on the actual error)
    post:
      security:
        - User-Restricted:
            - write:self-assessment
      summary: Add a UK Savings Account
      description: |
        This endpoint allows a developer to add a UK savings account.
        Interest income data can then be recorded against that savings account using the Amend a UK savings account annual summary endpoint.
        A National Insurance number must be provided.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                       |
        |----------------------------------|------------------------------------------------|
        | N/A - DEFAULT                    | Simulates success response.                    |
        | MAXIMUM_SAVINGS_ACCOUNTS_LIMIT   | Simulates the scenario where the maximum number of 1000 savings accounts is exceeded. |
        | DUPLICATE_ACCOUNT_NAME           | Simulates the scenario where a duplicate account name was supplied for the NINO.      |  
        | STATEFUL                         | Performs a stateful create.                                                           |
        | REQUEST_CANNOT_BE_FULFILLED      | Simulates the scenario where the request cannot be fulfilled for various reasons other than the ones triggering other errors.|
      tags:
        - UK Savings Account
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: *ref_3
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_4
          required: true
        - name: Content-Type
          in: header
          description: |
            Specifies the format of the request body, which must be JSON.
          schema: &ref_14
            type: string
            enum:
              - application/json
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *write:self-assessment* scope.
          schema: &ref_15
            type: string
            example: Bearer bb7fed3fe10dd235a2ccda3d50fb
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_5
          required: false
      requestBody:
        content:
          application/json:
            schema:
              $schema: http://json-schema.org/draft-04/schema#
              title: Add a Uk Savings Account Request
              description: Add a Uk Savings Account Request
              type: object
              properties:
                accountName:
                  type: string
                  description: Friendly account name.
                  pattern: ^[A-Za-z0-9 &'\(\)\*,\-\./@£]{1,32}$
                  example: Shares savings account
              required:
                - accountName
            examples:
              example-1:
                description: Request Example
                value:
                  $ref: ./examples/ukSavingsAccount/add_request.json
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
            Deprecation:
              name: Deprecation
              in: header
              description: |
                The deprecation date/time for this endpoint.
              schema: *ref_6
              required: false
            Sunset:
              name: Sunset
              in: header
              description: |
                The earliest date/time this endpoint will become unavailable after deprecation.
              schema: *ref_7
              required: false
            Link:
              name: Link
              in: header
              description: |
                URL of the documentation for the API.
              schema: *ref_8
              required: false
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema#
                title: Add a UK Savings Account Response
                description: Add a UK Savings Account Response
                type: object
                properties:
                  savingsAccountId:
                    type: string
                    description: 'The unique identifier of the savings account. Must conform to the regular expression: ^[A-Za-z0-9]{15}$'
                    example: SAVKB2UVwUTBQGJ
                required:
                  - savingsAccountId
              examples:
                example-response:
                  description: Example Response
                  value:
                    $ref: ./examples/ukSavingsAccount/add_response.json
        '400':
          description: Bad request
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                FORMAT_NINO:
                  description: The format of the supplied NINO field is not valid.
                  value: *ref_9
                FORMAT_ACCOUNT_NAME:
                  description: The format of the supplied account name field is not valid.
                  value: &ref_17
                    code: FORMAT_ACCOUNT_NAME
                    message: The provided account name is invalid
                RULE_INCORRECT_OR_EMPTY_BODY_SUBMITTED:
                  description: An empty or non-matching body was submitted.
                  value: &ref_18
                    code: RULE_INCORRECT_OR_EMPTY_BODY_SUBMITTED
                    message: An empty or non-matching body was submitted
                RULE_MAXIMUM_SAVINGS_ACCOUNTS_LIMIT:
                  description: The maximum number of 1000 savings accounts exceeded.
                  value:
                    code: RULE_MAXIMUM_SAVINGS_ACCOUNTS_LIMIT
                    message: The 1000 savings account limit exceeded
                RULE_DUPLICATE_ACCOUNT_NAME:
                  description: A duplicate account name was supplied for that National Insurance Number.
                  value: &ref_21
                    code: RULE_DUPLICATE_ACCOUNT_NAME
                    message: Duplicate account name given for supplied NINO
                RULE_INCORRECT_GOV_TEST_SCENARIO:
                  description: The request did not match any available Sandbox data. Check that the supplied Gov-Test-Scenario is correct for this endpoint version. This error will only be returned in the Sandbox environment.
                  value: *ref_10
        '403':
          description: Forbidden
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                CLIENT_OR_AGENT_NOT_AUTHORISED:
                  description: |
                    The client or agent is not authorised. This is because: the client is not subscribed to MTD, 
                    the agent is not subscribed to Agent Services, or the client has not authorised the agent to act on their behalf.
                  value: *ref_11
        '404':
          description: Not Found
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                MATCHING_RESOURCE_NOT_FOUND:
                  description: The supplied income source could not be found.
                  value: *ref_12
        '422':
          description: Unprocessable Entity
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                RULE_REQUEST_CANNOT_BE_FULFILLED:
                  description: The request cannot be fulfilled. More specific information is provided in the error message.
                  value: *ref_13
  /individuals/savings-income/uk-accounts/{nino}/account-name/{savingsId}:
