  /individuals/savings-income/uk-accounts/{nino}/{taxYear}/{savingsId}:
    get:
      security:
        - User-Restricted:
            - read:self-assessment
      summary: Retrieve UK Savings Account Annual Summary
      description: |
        This endpoint enables you to retrieve a UK savings account annual summary for a tax year.
        Use it to get the annual savings interest for a previously added savings account.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                       |
        | -------------------------------- | ---------------------------------------------- |
        | N/A - DEFAULT                    | Simulates success response.                    |
        | NOT_FOUND                        | Simulates the scenario where no data is found. |
        | STATEFUL                         | Performs a stateful retrieve. <br/><br/> Use the savingsAccountId of a savings account created with Add a UK Savings Account, otherwise a MATCHING_RESOURCE_NOT_FOUND error will be returned.                 |
        | REQUEST_CANNOT_BE_FULFILLED      | Simulates the scenario where the request cannot be fulfilled for various reasons other than the ones triggering other errors.|
      tags:
        - UK Savings Account
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: *ref_3
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year the data applies to. The start year and end year must not span two tax years.
            No gaps are allowed, for example, 2020-22 is not valid. The minimum tax year is 2019-20.
          schema:
            type: string
            example: 2021-22
          required: true
        - name: savingsAccountId
          in: path
          description: |
            The unique identifier of the savings account.
          schema: *ref_19
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_4
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *read:self-assessment* scope.
          schema: *ref_20
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_5
          required: false
      responses:
        '200':
          description: Success
          headers:
